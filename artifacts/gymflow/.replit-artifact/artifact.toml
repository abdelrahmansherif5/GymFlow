kind = "web"
previewPath = "/"
title = "GymFlow"
version = "1.0.0"
id = "artifacts/gymflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25654
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/gymflow run dev"

[services.env]
PORT = "25654"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gymflow", "run", "build"]
publicDir = "artifacts/gymflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
