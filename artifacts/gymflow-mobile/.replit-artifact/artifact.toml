kind = "mobile"
previewPath = "/gymflow-mobile/"
title = "GymFlow Mobile"
version = "1.0.0"
id = "artifacts/gymflow-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 25843
name = "expo"
paths = ["/gymflow-mobile/"]

[services.development]
run = "pnpm --filter @workspace/gymflow-mobile run dev"

[services.env]
PORT = "25843"
BASE_PATH = "/gymflow-mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gymflow-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/gymflow-mobile", "run", "serve"]
